spring:
  profiles:
    active: dev

server:
  port: 8080
  servlet:
    context-path: /

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs

knife4j:
  enable: true
  setting:
    language: zh_cn

jwt:
  secret: equipment-management-secret-key-must-be-at-least-256-bits-long
  expiration: 86400000
